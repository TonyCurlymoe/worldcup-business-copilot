services:
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
  app:
    build: .
    command: streamlit run src/app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      FRONTEND_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
